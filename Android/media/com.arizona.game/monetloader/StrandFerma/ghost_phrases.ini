; ============================================================
; ghost_phrases.ini — banks of phrases for StrandFerma
; Encoding: CP1251 (Windows-1251) — открывать редактором именно
;   в этой кодировке, иначе будут ромбы с вопросами.
; Author: Victor Strand
;
; Each [section] is a logical category (mood/style).
; Keys phrase1, phrase2... are the actual chat messages.
; Опечатки расставлены вручную — имитируют быстрый набор с мобилы.
; ============================================================

[settings]
; режим выбора: 'category' = сначала рандом категория, потом фраза;
;               'flat'     = равновероятно среди всех фраз
mode=category
; включенные категории через запятую (если пусто — берутся все)
enabled=aggressive,annoyed,territorial,friendly_ask,sarcastic,warning,businesslike,complaining,newbie_act,casual_chatter,philosophical,blunt_short,self_humor,plea,regional_color
; шанс вообще написать что-то когда подошел к кусту с людьми (0..100)
trigger_chance=100
; минимальный кулдаун между фразами в секундах
min_cooldown=8

